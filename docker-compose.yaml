# nginx proxy address - http://172.17.0.1:8108

name: transfer-sh
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  transfer-sh:
    image: dutchcoders/transfer.sh:latest
    pull_policy: always
    container_name: transfer-sh-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    logging: *default-logging
    networks:
      - transfer-sh
    ports:
      - "172.17.0.1:8108:8080"
    environment:
      TZ: ${TZ:-America/New_York}
    command:
      - "--provider=local"
      - "--basedir=/tmp/transfer-sh"
      - "--listener=:8080"
    volumes:
      - ./volumes/data/transfer-sh:/tmp/transfer-sh
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  transfer-sh:
    name: transfer-sh
    external: false
